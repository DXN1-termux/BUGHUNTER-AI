<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
  <style>
    text { font-family: "SF Mono","JetBrains Mono",monospace; }
    .bg { fill: #1a1b26; }
    .layer { rx: 10; }
    .l0 { fill: #7aa2f7; }
    .l1 { fill: #9ece6a; }
    .l2 { fill: #e0af68; }
    .l3 { fill: #f7768e; }
    .l4 { fill: #bb9af7; }
    .l5 { fill: #7dcfff; }
    .title { fill: #c0caf5; font-weight: bold; font-size: 14px; }
    .sub { fill: #a9b1d6; font-size: 11px; }
    .arrow { stroke: #565f89; stroke-width: 2; fill: none; }
    .lock { fill: #f7768e; font-size: 18px; }
    @keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: 0.4 } }
    .pulse { animation: pulse 2s ease-in-out infinite; }
  </style>

  <rect class="bg" width="900" height="600" rx="10"/>

  <text x="450" y="40" class="title" text-anchor="middle" font-size="20">🛡️ BUGHUNTER-AI Security Architecture</text>
  <text x="450" y="62" class="sub" text-anchor="middle">Defense-in-depth · Every request passes through 6 layers</text>

  <!-- User -->
  <rect x="50" y="100" width="130" height="50" rx="8" fill="#414868" stroke="#7aa2f7" stroke-width="2"/>
  <text x="115" y="130" class="title" text-anchor="middle">🧑 User prompt</text>

  <!-- Arrow -->
  <path class="arrow" d="M 180 125 L 230 125" marker-end="url(#arrow)"/>

  <!-- Layer 1: Hard Blocks -->
  <rect x="230" y="90" width="180" height="70" rx="8" fill="#f7768e" opacity="0.2" stroke="#f7768e" stroke-width="2"/>
  <text x="320" y="110" class="title" text-anchor="middle" fill="#f7768e">🔒 1. Hard Blocks</text>
  <text x="320" y="128" class="sub" text-anchor="middle">CSAM · Terrorism</text>
  <text x="320" y="142" class="sub" text-anchor="middle">CBRN · Mass Harm</text>
  <text x="320" y="155" class="sub" text-anchor="middle" font-size="9" fill="#9ece6a">IMMUTABLE · chmod 444</text>

  <path class="arrow" d="M 410 125 L 460 125" marker-end="url(#arrow)"/>

  <!-- Layer 2: Scope -->
  <rect x="460" y="90" width="180" height="70" rx="8" fill="#e0af68" opacity="0.2" stroke="#e0af68" stroke-width="2"/>
  <text x="550" y="110" class="title" text-anchor="middle" fill="#e0af68">🎯 2. Scope</text>
  <text x="550" y="128" class="sub" text-anchor="middle">Target in scope.yaml?</text>
  <text x="550" y="142" class="sub" text-anchor="middle">IPv4 · IPv6 · wildcards</text>
  <text x="550" y="155" class="sub" text-anchor="middle" font-size="9" fill="#9ece6a">User-editable</text>

  <path class="arrow" d="M 640 125 L 690 125" marker-end="url(#arrow)"/>

  <!-- Layer 3: Model -->
  <rect x="690" y="90" width="180" height="70" rx="8" fill="#bb9af7" opacity="0.2" stroke="#bb9af7" stroke-width="2"/>
  <text x="780" y="110" class="title" text-anchor="middle" fill="#bb9af7">🧠 3. Model</text>
  <text x="780" y="128" class="sub" text-anchor="middle">bugbounty-ai-v1</text>
  <text x="780" y="142" class="sub" text-anchor="middle">ReAct · 0.5B params</text>
  <text x="780" y="155" class="sub" text-anchor="middle" font-size="9" fill="#9ece6a">100% local</text>

  <!-- Down arrow -->
  <path class="arrow" d="M 780 160 L 780 215" marker-end="url(#arrow)"/>

  <!-- Layer 4: Shell Deny -->
  <rect x="690" y="215" width="180" height="70" rx="8" fill="#f7768e" opacity="0.2" stroke="#f7768e" stroke-width="2"/>
  <text x="780" y="235" class="title" text-anchor="middle" fill="#f7768e">⛔ 4. Shell Deny</text>
  <text x="780" y="253" class="sub" text-anchor="middle">rm -rf · fork bomb</text>
  <text x="780" y="267" class="sub" text-anchor="middle">curl | sh · mkfs</text>
  <text x="780" y="280" class="sub" text-anchor="middle" font-size="9" fill="#9ece6a">shlex-normalized</text>

  <!-- Left arrow -->
  <path class="arrow" d="M 690 250 L 640 250" marker-end="url(#arrow)"/>

  <!-- Layer 5: Path Sandbox -->
  <rect x="460" y="215" width="180" height="70" rx="8" fill="#7dcfff" opacity="0.2" stroke="#7dcfff" stroke-width="2"/>
  <text x="550" y="235" class="title" text-anchor="middle" fill="#7dcfff">📂 5. Path Sandbox</text>
  <text x="550" y="253" class="sub" text-anchor="middle">blocks /etc, ~/.ssh</text>
  <text x="550" y="267" class="sub" text-anchor="middle">/proc · /sys · core/</text>
  <text x="550" y="280" class="sub" text-anchor="middle" font-size="9" fill="#9ece6a">symlink-safe</text>

  <path class="arrow" d="M 460 250 L 410 250" marker-end="url(#arrow)"/>

  <!-- Layer 6: Rate Limiter -->
  <rect x="230" y="215" width="180" height="70" rx="8" fill="#9ece6a" opacity="0.2" stroke="#9ece6a" stroke-width="2"/>
  <text x="320" y="235" class="title" text-anchor="middle" fill="#9ece6a">⏱️ 6. Rate Limit</text>
  <text x="320" y="253" class="sub" text-anchor="middle">90 calls/turn max</text>
  <text x="320" y="267" class="sub" text-anchor="middle">A-B-A loop detect</text>
  <text x="320" y="280" class="sub" text-anchor="middle" font-size="9" fill="#9ece6a">per-session window</text>

  <path class="arrow" d="M 230 250 L 180 250" marker-end="url(#arrow)"/>

  <!-- Tool dispatch -->
  <rect x="50" y="215" width="130" height="70" rx="8" fill="#414868" stroke="#9ece6a" stroke-width="2"/>
  <text x="115" y="235" class="title" text-anchor="middle">🔧 Tool dispatch</text>
  <text x="115" y="253" class="sub" text-anchor="middle">shell, nmap, nuclei</text>
  <text x="115" y="267" class="sub" text-anchor="middle">fetch, subfinder...</text>

  <!-- Kill switch -->
  <g class="pulse">
    <rect x="350" y="340" width="200" height="60" rx="30" fill="#f7768e" opacity="0.3" stroke="#f7768e" stroke-width="3"/>
    <text x="450" y="365" class="title" text-anchor="middle" fill="#f7768e" font-size="16">🛑 FREEZE switch</text>
    <text x="450" y="385" class="sub" text-anchor="middle">touch ~/.slm/FREEZE → all tools halt</text>
  </g>

  <!-- Bottom: audit log -->
  <rect x="50" y="440" width="800" height="120" rx="8" fill="#24283b" stroke="#414868"/>
  <text x="70" y="465" class="title" fill="#7dcfff">📜 Append-only audit trail (~/.slm/traces/)</text>
  <text x="70" y="488" class="sub" font-family="SF Mono,monospace">• hardblock.log   → SHA-256 hash of blocked input + category</text>
  <text x="70" y="508" class="sub" font-family="SF Mono,monospace">• traces.db       → every tool_call + result (50k event rolling window)</text>
  <text x="70" y="528" class="sub" font-family="SF Mono,monospace">• exemplars       → successful sessions saved for few-shot retrieval</text>
  <text x="70" y="548" class="sub" font-family="SF Mono,monospace" fill="#9ece6a">✓ chmod 444 on core · git-tracked config · eval-gated self-improvement</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#565f89"/>
    </marker>
  </defs>
</svg>
