<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <style>
    text { font-family: "SF Mono","JetBrains Mono",monospace; fill: #c0caf5; }
    .bg { fill: #1a1b26; }
    .title { font-weight: bold; font-size: 20px; }
    .axis { stroke: #565f89; stroke-width: 1; }
    .grid { stroke: #414868; stroke-width: 0.5; stroke-dasharray: 2 3; }
    .label { font-size: 11px; fill: #a9b1d6; }
    .value { font-size: 12px; font-weight: bold; }
    @keyframes grow { from { width: 0; } to { width: var(--w); } }
    .bar { animation: grow 1.2s cubic-bezier(0.4, 0, 0.2, 1) both; transform-origin: left; }
    .b1 { animation-delay: 0.2s; }
    .b2 { animation-delay: 0.35s; }
    .b3 { animation-delay: 0.5s; }
    .b4 { animation-delay: 0.65s; }
    .b5 { animation-delay: 0.8s; }
    .b6 { animation-delay: 0.95s; }
    .b7 { animation-delay: 1.1s; }
    .b8 { animation-delay: 1.25s; }
  </style>

  <rect class="bg" width="900" height="500" rx="10"/>

  <text x="450" y="40" class="title" text-anchor="middle">⚡ Sustained tok/s · real devices</text>
  <text x="450" y="62" class="label" text-anchor="middle" font-size="12">60-second benchmark · not peak burst</text>

  <!-- Grid lines -->
  <g>
    <line class="grid" x1="220" y1="100" x2="220" y2="450"/>
    <line class="grid" x1="360" y1="100" x2="360" y2="450"/>
    <line class="grid" x1="500" y1="100" x2="500" y2="450"/>
    <line class="grid" x1="640" y1="100" x2="640" y2="450"/>
    <line class="grid" x1="780" y1="100" x2="780" y2="450"/>
  </g>

  <!-- X-axis labels (tok/s scale) -->
  <text x="220" y="470" class="label" text-anchor="middle">50</text>
  <text x="360" y="470" class="label" text-anchor="middle">100</text>
  <text x="500" y="470" class="label" text-anchor="middle">150</text>
  <text x="640" y="470" class="label" text-anchor="middle">200</text>
  <text x="780" y="470" class="label" text-anchor="middle">250</text>
  <text x="500" y="490" class="label" text-anchor="middle" font-size="10" fill="#565f89">tokens/second</text>

  <!-- Bars -->
  <!-- RTX 3060 (workstation) - 225 tok/s -->
  <g transform="translate(80, 100)">
    <text x="-10" y="18" class="label" text-anchor="end">🖥️ RTX 3060 (CUDA)</text>
    <rect class="bar b1" x="0" y="8" width="630" height="20" rx="3" fill="#9ece6a"/>
    <text x="620" y="22" class="value" fill="#9ece6a">225</text>
  </g>

  <!-- M3 Pro (workstation) - 130 -->
  <g transform="translate(80, 140)">
    <text x="-10" y="18" class="label" text-anchor="end">🖥️ M3 Pro (Metal)</text>
    <rect class="bar b2" x="0" y="8" width="364" height="20" rx="3" fill="#9ece6a"/>
    <text x="354" y="22" class="value" fill="#9ece6a">130</text>
  </g>

  <!-- M1 Air (desktop) - 75 -->
  <g transform="translate(80, 180)">
    <text x="-10" y="18" class="label" text-anchor="end">💻 M1 Air (Metal)</text>
    <rect class="bar b3" x="0" y="8" width="210" height="20" rx="3" fill="#bb9af7"/>
    <text x="200" y="22" class="value" fill="#bb9af7">75</text>
  </g>

  <!-- i5-1240P (desktop) - 37 -->
  <g transform="translate(80, 220)">
    <text x="-10" y="18" class="label" text-anchor="end">💻 i5-1240P</text>
    <rect class="bar b4" x="0" y="8" width="104" height="20" rx="3" fill="#bb9af7"/>
    <text x="94" y="22" class="value" fill="#bb9af7">37</text>
  </g>

  <!-- S23 (mobile) - 45 -->
  <g transform="translate(80, 260)">
    <text x="-10" y="18" class="label" text-anchor="end">📱 Galaxy S23</text>
    <rect class="bar b5" x="0" y="8" width="126" height="20" rx="3" fill="#7aa2f7"/>
    <text x="116" y="22" class="value" fill="#7aa2f7">45</text>
  </g>

  <!-- Pixel 7 (mobile) - 32 -->
  <g transform="translate(80, 300)">
    <text x="-10" y="18" class="label" text-anchor="end">📱 Pixel 7</text>
    <rect class="bar b6" x="0" y="8" width="90" height="20" rx="3" fill="#7aa2f7"/>
    <text x="80" y="22" class="value" fill="#7aa2f7">32</text>
  </g>

  <!-- A52 (mobile) - 25 -->
  <g transform="translate(80, 340)">
    <text x="-10" y="18" class="label" text-anchor="end">📱 Samsung A52</text>
    <rect class="bar b7" x="0" y="8" width="70" height="20" rx="3" fill="#7aa2f7"/>
    <text x="60" y="22" class="value" fill="#7aa2f7">25</text>
  </g>

  <!-- Raspberry Pi 5 (mobile) - 12 -->
  <g transform="translate(80, 380)">
    <text x="-10" y="18" class="label" text-anchor="end">🥧 Raspberry Pi 5</text>
    <rect class="bar b8" x="0" y="8" width="34" height="20" rx="3" fill="#7aa2f7"/>
    <text x="24" y="22" class="value" fill="#7aa2f7">12</text>
  </g>

  <!-- Legend -->
  <g transform="translate(80, 430)">
    <circle cx="5" cy="5" r="5" fill="#9ece6a"/>
    <text x="16" y="9" class="label" font-size="10">workstation (Q6_K)</text>
    <circle cx="165" cy="5" r="5" fill="#bb9af7"/>
    <text x="176" y="9" class="label" font-size="10">desktop (Q4_K_M)</text>
    <circle cx="315" cy="5" r="5" fill="#7aa2f7"/>
    <text x="326" y="9" class="label" font-size="10">mobile (IQ2_XS)</text>
  </g>
</svg>
