<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUGHUNTER-AI | TITAN Chat</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <header>
            <div class="logo">
                <span class="prefix">BUGHUNTER</span><span class="suffix">-AI</span>
            </div>
            <div class="status">
                <span class="status-indicator"></span>
                <span class="status-text">LOCAL_CORE: ONLINE</span>
            </div>
        </header>

        <main id="chat-container">
            <div id="messages">
                <div class="message system">
                    <div class="content">Welcome to the BUGHUNTER-AI Web Interface. All security guardrails are ACTIVE.</div>
                </div>
            </div>
        </main>

        <footer>
            <form id="chat-form">
                <input type="text" id="user-input" placeholder="Enter target recon goal or security query..." autocomplete="off">
                <button type="submit">SEND</button>
            </form>
        </footer>
    </div>

    <script>
        const messagesDiv = document.getElementById('messages');
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');

        function addMessage(role, content, kind = null) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;
            if (kind) msgDiv.classList.add(kind);
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'content';
            
            if (role === 'assistant') {
                // Simple markdown-ish bolding
                content = content.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                content = content.replace(/\n/g, '<br>');
            }
            
            contentDiv.innerHTML = content;
            msgDiv.appendChild(contentDiv);
            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        chatForm.onsubmit = async (e) => {
            e.preventDefault();
            const text = userInput.value.trim();
            if (!text) return;

            addMessage('user', text);
            userInput.value = '';
            
            const loadingMsg = document.createElement('div');
            loadingMsg.className = 'message assistant loading';
            loadingMsg.innerHTML = '<div class="content">Thinking...</div>';
            messagesDiv.appendChild(loadingMsg);

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                const data = await response.json();
                
                messagesDiv.removeChild(loadingMsg);
                
                if (data.error) {
                    addMessage('system', data.error, 'error');
                } else {
                    data.events.forEach(ev => {
                        if (ev.kind === 'thought') {
                            addMessage('assistant', ev.content, 'thought');
                        } else if (ev.kind === 'final') {
                            addMessage('assistant', ev.content, 'final');
                        } else if (ev.kind === 'tool_call') {
                            addMessage('assistant', `<em>Tool Call: ${ev.content}</em>`, 'tool');
                        } else if (ev.kind === 'error') {
                            addMessage('system', ev.content, 'error');
                        }
                    });
                }
            } catch (err) {
                messagesDiv.removeChild(loadingMsg);
                addMessage('system', 'Connection lost.', 'error');
            }
        };
    </script>
</body>
</html>
